name: Generated Markdown CI (SUMMARY + non-root README)

on:
  pull_request:
    paths:
      - "**/*.md"
      - "scripts/update_summary.py"
      - ".github/workflows/summary-ci.yml"
      - ".github/workflows/summary-cd.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check generated markdown sync
        run: python scripts/update_summary.py --check
