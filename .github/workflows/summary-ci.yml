name: Summary CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check SUMMARY.md sync
        run: python scripts/update_summary.py --check
