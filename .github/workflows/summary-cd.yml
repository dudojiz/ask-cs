name: Generated Markdown CD (SUMMARY + non-root README)

on:
  push:
    branches:
      - "**"
    paths:
      - "**/*.md"
      - "scripts/update_summary.py"
      - ".github/workflows/summary-ci.yml"
      - ".github/workflows/summary-cd.yml"
  workflow_dispatch:
    inputs:
      mode:
        description: "Execution mode (check-only or apply)"
        required: true
        default: apply
        type: choice
        options:
          - check-only
          - apply

permissions:
  contents: write

concurrency:
  group: summary-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-generated-markdown:
    if: github.actor != 'github-actions[bot]' && !startsWith(github.event.head_commit.message || '', 'chore(summary):')
    runs-on: ubuntu-latest
    env:
      MODE: ${{ github.event.inputs.mode || 'apply' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update generated markdown files
        run: |
          if [ "$MODE" = "check-only" ]; then
            python scripts/update_summary.py --check
          else
            python scripts/update_summary.py
          fi

      - name: Commit and push if changed
        if: env.MODE == 'apply'
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- SUMMARY.md ':(glob)**/README.md'
          if git diff --cached --quiet; then
            echo "No allowed generated file changes."
            exit 0
          fi
          git commit -m "chore(summary): auto update generated markdown"
          git push
